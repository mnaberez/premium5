<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Premium 5 Radio Emulator</title>
<link rel="icon" href="data:,">
<link rel="stylesheet" href="stylesheets/style.css">
</head>
<body>
<div class="container">
    <div class="faceplate-panel">
        <img class="faceplate-img" src="images/faceplate-upscaled-990px.png" draggable="false">
        <canvas class="faceplate-canvas" id="faceplate-canvas"></canvas>
        <img class="faceplate-asset" id="picto-dolby" src="images/pictograph-dolby.png">
        <img class="faceplate-asset" id="picto-metal" src="images/pictograph-metal.png">
        <img class="faceplate-asset" id="picto-mix" src="images/pictograph-mix.png">
        <img class="faceplate-asset" id="picto-period" src="images/pictograph-period.png">
    </div>

    <div id="registers-view">
        <div class="reg-bar">
            <span class="reg-name">PC </span><span class="reg-value" data-reg="pc">0000</span>
            <span class="reg-name">SP </span><span class="reg-value" data-reg="sp">0000</span>
            <span class="reg-name">AX </span><span class="reg-value" data-reg="ax">0000</span>
            <span class="reg-name">BC </span><span class="reg-value" data-reg="bc">0000</span>
            <span class="reg-name">DE </span><span class="reg-value" data-reg="de">0000</span>
            <span class="reg-name">HL </span><span class="reg-value" data-reg="hl">0000</span>
        </div>
        <div class="reg-bar">
            <span class="reg-name">PSW </span><span class="reg-value" data-reg="psw">00</span>
            <span class="flag-clear" data-rb="0">RB0</span>
            <span class="flag-clear" data-rb="1">RB1</span>
            <span class="flag-clear" data-rb="2">RB2</span>
            <span class="flag-clear" data-rb="3">RB3</span>
            <span class="flag-clear" data-flag="ie">IE</span>
            <span class="flag-clear" data-flag="isp">ISP</span>
            <span class="flag-clear" data-flag="z">Z</span>
            <span class="flag-clear" data-flag="ac">AC</span>
            <span class="flag-clear" data-flag="cy">CY</span>
        </div>
    </div>

    <div class="controls">
        <button id="btn-start" onclick="sendCmd('start')">Run</button>
        <button id="btn-stop" onclick="sendCmd('stop')" disabled>Stop</button>
        <button id="btn-step" onclick="sendCmd('step')">Step</button>
        <button id="btn-animate" onclick="toggleAnimate()">Animate</button>
        <button id="btn-reset" onclick="sendCmd('reset')">Reset</button>
        <span class="status-text status-stopped" id="status">STOPPED</span>
        <span class="speed-control" id="animate-speed" style="display:none">
            Speed <input type="range" id="speed-slider" min="50" max="500" step="50" value="200"
                oninput="setAnimateSpeed(this.value)"><span id="speed-label">200ms</span>
        </span>
    </div>

    <div class="info-row">
        <div class="panel" id="panel-left">
            <div class="tab-bar">
                <button class="active" onclick="switchTab('hs-ram')">High-Speed RAM</button>
                <button onclick="switchTab('exp-ram')">Expansion RAM</button>
                <button onclick="switchTab('eeprom')">EEPROM</button>
            </div>
            <div class="tab-body">
                <div class="tab-content active" id="tab-hs-ram">
                    <div class="mem-dump" id="mem-hs-ram"></div>
                </div>
                <div class="tab-content" id="tab-exp-ram">
                    <div class="mem-dump" id="mem-exp-ram"></div>
                </div>
                <div class="tab-content" id="tab-eeprom">
                    <div class="mem-dump" id="mem-eeprom"></div>
                </div>
            </div>
        </div>

        <div class="panel" id="panel-instructions">
            <div class="panel-header">
                <h2>Instructions</h2>
                <button class="expand-btn" id="expand-btn" onclick="toggleExpand()">[+]</button>
            </div>
            <div class="disasm-listing" id="disasm-listing"></div>
            <div class="listing-view" id="listing-view"></div>
        </div>
    </div>

    <div class="status-bar" id="statistics-view">
        Cycles: <span class="cycles-value" data-stat="cycles">0</span>
        | Simulated: <span class="cycles-value" data-stat="sim-time">0.000</span>s
        | Speed: <span class="cycles-value" data-stat="speed-pct">0.0</span>% (actual: <span class="cycles-value" data-stat="real-mhz">0.0</span> MHz, raw: <span class="cycles-value" data-stat="potential-mhz">0.0</span> MHz)
    </div>
</div>

<script src="javascripts/connection.js"></script>
<script src="javascripts/faceplate.js"></script>
<script src="javascripts/views.js"></script>
<script src="javascripts/controls.js"></script>
<script src="javascripts/app.js"></script>
</body>
</html>
